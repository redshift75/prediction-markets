<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Prediction Markets Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=3"/>

<template id="__bundler_thumbnail" data-bg-color="#f8fafc">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f8fafc"/>
    <rect x="360" y="240" width="480" height="60" rx="8" fill="#e2e8f0"/>
    <rect x="360" y="320" width="480" height="40" rx="6" fill="#e2e8f0"/>
    <rect x="360" y="380" width="360" height="40" rx="6" fill="#e2e8f0"/>
    <rect x="360" y="440" width="420" height="40" rx="6" fill="#e2e8f0"/>
    <g transform="translate(540 540)">
      <circle cx="60" cy="30" r="28" fill="#3b82f6"/>
      <path d="M48 30 L56 38 L74 22" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">PM Monitor</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="filters.jsx"></script>
<script type="text/babel" src="browse.jsx"></script>
<script type="text/babel" src="watchlists.jsx"></script>
<script type="text/babel" src="subscriptions.jsx"></script>

<script>
// Tweaks defaults
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "split"
}/*EDITMODE-END*/;
</script>

<script type="text/babel">

const { useState, useEffect } = React;

function Sidebar({ page, setPage, subCount, watchlistCount }) {
  return (
    <aside className="sidebar">
      <div className="sidebar-brand">
        <div className="sidebar-brand-logo"><Icon.Activity size={18} /></div>
        <div className="sidebar-brand-title">PM Monitor</div>
      </div>
      <div className="nav-section-label">Workspace</div>
      <button className={`nav-item ${page === "browse" ? "active" : ""}`} onClick={() => setPage("browse")}>
        <Icon.LayoutGrid size={15} /> Explore
      </button>
      <button className={`nav-item ${page === "subscriptions" ? "active" : ""}`} onClick={() => setPage("subscriptions")}>
        <Icon.Bell size={15} /> Subscriptions
        <span className="count">{subCount}</span>
      </button>
      <button className={`nav-item ${page === "watchlists" ? "active" : ""}`} onClick={() => setPage("watchlists")}>
        <Icon.LayoutGrid size={15} /> Watchlists
        <span className="count">{watchlistCount}</span>
      </button>
      <button className="nav-item" onClick={(e) => e.preventDefault()} style={{ opacity: 0.6 }}>
        <Icon.AlertCircle size={15} /> Alert history
      </button>

      <div className="nav-section-label">Account</div>
      <button className="nav-item" style={{ opacity: 0.6 }}><Icon.Settings size={15} /> Settings</button>

      <div style={{ marginTop: 'auto', padding: '12px 10px', borderTop: '1px solid hsl(var(--border))', fontSize: 12, color: 'hsl(var(--muted-foreground))', display: 'flex', gap: 10, alignItems: 'center' }}>
        <div style={{ width: 28, height: 28, borderRadius: 999, background: 'hsl(221 83% 53%)', color: 'white', display: 'grid', placeItems: 'center', fontSize: 11, fontWeight: 600 }}>AK</div>
        <div style={{ minWidth: 0 }}>
          <div style={{ color: 'hsl(var(--foreground))', fontWeight: 500, fontSize: 12.5 }}>Alex Kim</div>
          <div className="truncate">alex@firm.com</div>
        </div>
      </div>
    </aside>);
}

function TweaksPanel() {
  // Tweaks disabled — single fixed layout.
  return null;
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem("pm.page") || "browse");
  const [subscriptions, setSubscriptions] = useState(() => {
    const saved = localStorage.getItem("pm.subs");
    if (saved) {try {return JSON.parse(saved);} catch (e) {}}
    return window.MARKETS_DATA.SUBSCRIPTIONS;
  });
  const [watchlists, setWatchlists] = useState(() => {
    const defaults = window.MARKETS_DATA.WATCHLISTS || [];
    const systemLists = defaults.filter((w) => w.system);
    const saved = localStorage.getItem("pm.watchlists");
    let userLists = defaults.filter((w) => !w.system);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        userLists = parsed.filter((w) => !w.system);
      } catch (e) {}
    }
    return [...systemLists, ...userLists];
  });

  useEffect(() => localStorage.setItem("pm.page", page), [page]);
  useEffect(() => localStorage.setItem("pm.subs", JSON.stringify(subscriptions)), [subscriptions]);
  useEffect(() => {
    // only persist user-created lists
    localStorage.setItem("pm.watchlists", JSON.stringify(watchlists.filter((w) => !w.system)));
  }, [watchlists]);
  const [browseListFocus, setBrowseListFocus] = useState(null);

  const addSubscription = (s) => {
    const newSub = {
      ...s,
      id: "s" + Math.random().toString(36).slice(2, 8),
      createdAt: new Date().toLocaleDateString("en-US"),
      lastAlert: "—"
    };
    setSubscriptions((prev) => [newSub, ...prev]);
  };

  const addSubscribeList = (list) => {
    const existing = subscriptions.find((s) => s.listId === list.id && s.active);
    if (existing) return;
    const newSub = {
      id: "s" + Math.random().toString(36).slice(2, 8),
      listId: list.id,
      listName: list.name,
      scope: "list",
      active: true,
      createdAt: new Date().toLocaleDateString("en-US"),
      lastAlert: "—",
      threshold: 5,
      delivery: "email"
    };
    setSubscriptions((prev) => [newSub, ...prev]);
  };

  const titleMap = {
    browse: { title: "Explore Contracts", sub: "Daily performance tracking and anomaly detection" },
    subscriptions: { title: "Subscription management", sub: "Edit thresholds, tags, and delivery for your alerts" },
    watchlists: { title: "Watchlists", sub: "Organize markets into reusable custom lists" }
  };
  const t = titleMap[page];

  return (
    <div className="app" data-screen-label={page === "browse" ? "Browse" : page === "watchlists" ? "Watchlists" : "Subscriptions"}>
      <Sidebar page={page} setPage={setPage} subCount={subscriptions.filter((s) => s.active).length} watchlistCount={watchlists.length} />
      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{t.title}</div>
            <div className="topbar-sub">{t.sub}</div>
          </div>
          <div className="topbar-actions">
            {page === "browse" &&
            <>
                <button className="btn btn-sm" onClick={() => window.dispatchEvent(new CustomEvent('pm:subscribe-tag'))} style={{ whiteSpace: 'nowrap' }}>
                  <Icon.Plus size={12} /> Subscribe to tag
                </button>
                <button className="btn btn-primary btn-sm" onClick={() => setPage("subscriptions")} style={{ whiteSpace: 'nowrap' }}>
                  <Icon.Bell size={12} /> Manage subscriptions
                </button>
              </>
            }
          </div>
        </div>
        {page === "browse" ?
        <BrowsePage
          subscriptions={subscriptions}
          addSubscription={addSubscription}
          watchlists={watchlists}
          setWatchlists={setWatchlists}
          focusListId={browseListFocus}
          clearFocusList={() => setBrowseListFocus(null)} /> :

        page === "watchlists" ?
        <WatchlistsPage
          watchlists={watchlists}
          setWatchlists={setWatchlists}
          subscriptions={subscriptions}
          onOpenInBrowse={(id) => {setBrowseListFocus(id);setPage("browse");}}
          onSubscribeList={addSubscribeList} /> :

        <SubscriptionsPage subscriptions={subscriptions} setSubscriptions={setSubscriptions} addSubscription={addSubscription} />}
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
