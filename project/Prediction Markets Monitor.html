<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Prediction Markets Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=16"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.4/styles/ag-grid.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.4/styles/ag-theme-quartz.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.4/dist/ag-grid-community.min.js"></script>

<script src="data.js?v=6"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="filters.jsx"></script>
<script type="text/babel" src="browse.jsx"></script>
<script type="text/babel" src="watchlists.jsx"></script>
<script type="text/babel" src="subscriptions.jsx"></script>

<script>
// Tweaks defaults
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "split"
}/*EDITMODE-END*/;
</script>

<script type="text/babel">





const { useState, useEffect } = React;

function TopNav({ page, setPage, subCount, watchlistCount }) {
  return (
    <header className="topnav">
      <div className="topnav-inner">
        <div className="topnav-brand">
          <div className="topnav-brand-logo"><img src="assets/bam-icon.jpeg" alt="BAM" /></div>
          <div className="topnav-brand-title">Prediction Hub</div>
        </div>

        <nav className="topnav-links">
          <button className={`topnav-item ${page === "browse" ? "active" : ""}`} onClick={() => setPage("browse")}>
            <Icon.LayoutGrid size={14} /> Explore Contracts
          </button>
          <button className={`topnav-item ${page === "subscriptions" ? "active" : ""}`} onClick={() => setPage("subscriptions")}>
            <Icon.Bell size={14} /> Manage Subscriptions
            <span className="count">{subCount}</span>
          </button>
          <button className={`topnav-item ${page === "watchlists" ? "active" : ""}`} onClick={() => setPage("watchlists")}>
            <Icon.Bookmark size={14} /> Manage Custom Themes
            <span className="count">{watchlistCount}</span>
          </button>
        </nav>

        <div className="topnav-right">
          <button className="topnav-item topnav-icon" style={{ opacity: 0.7 }} title="Settings">
            <Icon.Settings size={15} />
          </button>
          <div className="topnav-user">
            <div className="topnav-avatar">AK</div>
            <div className="topnav-user-text">
              <div className="topnav-user-name">Alex Kim</div>
              <div className="topnav-user-email">alex@firm.com</div>
            </div>
          </div>
        </div>
      </div>
    </header>);
}

function TweaksPanel() {
  // Tweaks disabled — single fixed layout.
  return null;
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem("pm.page") || "browse");
  const [subscriptions, setSubscriptions] = useState(() => {
    const saved = localStorage.getItem("pm.subs");
    if (saved) {try {return JSON.parse(saved);} catch (e) {}}
    return window.MARKETS_DATA.SUBSCRIPTIONS;
  });
  const [watchlists, setWatchlists] = useState(() => {
    const defaults = window.MARKETS_DATA.WATCHLISTS || [];
    const systemLists = defaults.filter((w) => w.system);
    const saved = localStorage.getItem("pm.watchlists");
    let userLists = defaults.filter((w) => !w.system);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        userLists = parsed.filter((w) => !w.system);
      } catch (e) {}
    }
    return [...systemLists, ...userLists];
  });

  useEffect(() => localStorage.setItem("pm.page", page), [page]);
  useEffect(() => localStorage.setItem("pm.subs", JSON.stringify(subscriptions)), [subscriptions]);
  useEffect(() => {
    // only persist user-created lists
    localStorage.setItem("pm.watchlists", JSON.stringify(watchlists.filter((w) => !w.system)));
  }, [watchlists]);
  const [browseListFocus, setBrowseListFocus] = useState(null);

  const addSubscription = (s) => {
    const newSub = {
      ...s,
      id: "s" + Math.random().toString(36).slice(2, 8),
      createdAt: new Date().toLocaleDateString("en-US"),
      lastAlert: "—"
    };
    setSubscriptions((prev) => [newSub, ...prev]);
  };

  const addSubscribeList = (list) => {
    const existing = subscriptions.find((s) => s.listId === list.id && s.active);
    if (existing) return;
    const newSub = {
      id: "s" + Math.random().toString(36).slice(2, 8),
      listId: list.id,
      listName: list.name,
      scope: "list",
      active: true,
      createdAt: new Date().toLocaleDateString("en-US"),
      lastAlert: "—",
      threshold: 5,
      delivery: "email"
    };
    setSubscriptions((prev) => [newSub, ...prev]);
  };

  const titleMap = {
    browse: { title: "Explore Contracts", sub: "Daily performance tracking and anomaly detection" },
    subscriptions: { title: "Subscription management", sub: "Edit thresholds, tags, and delivery for your alerts" },
    watchlists: { title: "Watchlist Manager", sub: "Organize contracts into reusable custom lists" }
  };
  const t = titleMap[page];

  return (
    <div className="app" data-screen-label={page === "browse" ? "Browse" : page === "watchlists" ? "Watchlists" : "Subscriptions"}>
      <TopNav page={page} setPage={setPage} subCount={subscriptions.filter((s) => s.active).length} watchlistCount={watchlists.length} />
      <div className="main">
        {page === "browse" ?
        <BrowsePage
          subscriptions={subscriptions}
          addSubscription={addSubscription}
          watchlists={watchlists}
          setWatchlists={setWatchlists}
          focusListId={browseListFocus}
          clearFocusList={() => setBrowseListFocus(null)} /> :

        page === "watchlists" ?
        <WatchlistsPage
          watchlists={watchlists}
          setWatchlists={setWatchlists}
          subscriptions={subscriptions}
          onOpenInBrowse={(id) => {setBrowseListFocus(id);setPage("browse");}}
          onSubscribeList={addSubscribeList} /> :

        <SubscriptionsPage subscriptions={subscriptions} setSubscriptions={setSubscriptions} addSubscription={addSubscription} />}
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
