<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Prediction Markets Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="filters.jsx"></script>
<script type="text/babel" src="browse.jsx"></script>
<script type="text/babel" src="subscriptions.jsx"></script>

<script>
// Tweaks defaults
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "table"
}/*EDITMODE-END*/;
</script>

<script type="text/babel">
const { useState, useEffect } = React;

function Sidebar({ page, setPage, subCount }) {
  return (
    <aside className="sidebar">
      <div className="sidebar-brand">
        <div className="sidebar-brand-logo"><Icon.Activity size={18}/></div>
        <div>
          <div className="sidebar-brand-title">PM Monitor</div>
          <div className="sidebar-brand-sub">Daily performance</div>
        </div>
      </div>
      <div className="nav-section-label">Workspace</div>
      <button className={`nav-item ${page==="browse"?"active":""}`} onClick={() => setPage("browse")}>
        <Icon.LayoutGrid size={15}/> Browse markets
      </button>
      <button className={`nav-item ${page==="subscriptions"?"active":""}`} onClick={() => setPage("subscriptions")}>
        <Icon.Bell size={15}/> Subscriptions
        <span className="count">{subCount}</span>
      </button>
      <button className="nav-item" onClick={(e)=>e.preventDefault()} style={{opacity:0.6}}>
        <Icon.AlertCircle size={15}/> Alert history
      </button>

      <div className="nav-section-label">Account</div>
      <button className="nav-item" style={{opacity:0.6}}><Icon.Settings size={15}/> Settings</button>

      <div style={{marginTop:'auto', padding:'12px 10px', borderTop:'1px solid hsl(var(--border))', fontSize:12, color:'hsl(var(--muted-foreground))', display:'flex', gap:10, alignItems:'center'}}>
        <div style={{width:28, height:28, borderRadius:999, background:'hsl(221 83% 53%)', color:'white', display:'grid', placeItems:'center', fontSize:11, fontWeight:600}}>AK</div>
        <div style={{minWidth:0}}>
          <div style={{color:'hsl(var(--foreground))', fontWeight:500, fontSize:12.5}}>Alex Kim</div>
          <div className="truncate">alex@firm.com</div>
        </div>
      </div>
    </aside>
  );
}

function TweaksPanel({ layout, setLayout }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  if (!open) return null;
  const setL = (l) => {
    setLayout(l);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { layout: l } }, '*');
  };
  return (
    <div className="tweaks-panel">
      <h3>Tweaks</h3>
      <div className="tweak-row">
        <div style={{fontSize:11.5, color:'hsl(var(--muted-foreground))', fontWeight:500}}>Browse layout</div>
        <div className="seg">
          <button className={layout==="table"?"on":""} onClick={() => setL("table")}>Table</button>
          <button className={layout==="compact"?"on":""} onClick={() => setL("compact")}>Compact</button>
          <button className={layout==="split"?"on":""} onClick={() => setL("split")}>Split</button>
        </div>
      </div>
      <div style={{fontSize:11, color:'hsl(var(--muted-foreground))', lineHeight:1.5, marginTop:6}}>
        <strong>Table</strong> — click row to expand detail inline.<br/>
        <strong>Compact</strong> — adds tag chips across top.<br/>
        <strong>Split</strong> — list left, detail right.
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem("pm.page") || "browse");
  const [layout, setLayout] = useState(() => localStorage.getItem("pm.layout") || window.TWEAK_DEFAULTS.layout);
  const [subscriptions, setSubscriptions] = useState(() => {
    const saved = localStorage.getItem("pm.subs");
    if (saved) { try { return JSON.parse(saved); } catch (e) {} }
    return window.MARKETS_DATA.SUBSCRIPTIONS;
  });

  useEffect(() => localStorage.setItem("pm.page", page), [page]);
  useEffect(() => localStorage.setItem("pm.layout", layout), [layout]);
  useEffect(() => localStorage.setItem("pm.subs", JSON.stringify(subscriptions)), [subscriptions]);

  const addSubscription = (s) => {
    const newSub = {
      ...s,
      id: "s" + Math.random().toString(36).slice(2, 8),
      createdAt: new Date().toLocaleDateString("en-US"),
      lastAlert: "—",
    };
    setSubscriptions(prev => [newSub, ...prev]);
  };

  const titleMap = {
    browse: { title: "Browse markets", sub: "Daily performance tracking and anomaly detection" },
    subscriptions: { title: "Subscription management", sub: "Edit thresholds, tags, and delivery for your alerts" },
  };
  const t = titleMap[page];

  return (
    <div className="app" data-screen-label={page === "browse" ? "Browse" : "Subscriptions"}>
      <Sidebar page={page} setPage={setPage} subCount={subscriptions.filter(s=>s.active).length}/>
      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{t.title}</div>
            <div className="topbar-sub">{t.sub}</div>
          </div>
          <div className="topbar-actions">
            {page === "browse" && (
              <button className="btn btn-primary btn-sm" onClick={() => setPage("subscriptions")} style={{whiteSpace:'nowrap'}}>
                <Icon.Bell size={12}/> Manage subscriptions
              </button>
            )}
          </div>
        </div>
        {page === "browse"
          ? <BrowsePage layout={layout} subscriptions={subscriptions} addSubscription={addSubscription}/>
          : <SubscriptionsPage subscriptions={subscriptions} setSubscriptions={setSubscriptions}/>}
      </div>
      <TweaksPanel layout={layout} setLayout={setLayout}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
